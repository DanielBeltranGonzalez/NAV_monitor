services:
  nav-monitor:
    image: tacombel/nav-monitor:latest
    container_name: nav-monitor
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=file:/data/nav.db
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - nav_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  nav_data:
